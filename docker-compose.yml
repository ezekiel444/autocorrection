services:
  llm:
    image: ollama/ollama:latest
    container_name: autocorrect-llm
    networks:
      - internal_net
      - app_net
    volumes:
      - models_data:/root/.ollama
      - ./services/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
      - ./certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - MODEL_NAME=${MODEL_NAME:-llama3.2:3b}
    # GPU support for Podman: uncomment and use CDI device if you have NVIDIA GPU
    # devices:
    #   - nvidia.com/gpu=all
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  correction-engine:
    build: ./services/correction-engine
    container_name: autocorrect-engine
    networks:
      - internal_net
      - app_net
      - external_net
    volumes:
      - app_data:/data
      - plugins_data:/plugins
      - ./config:/config:ro
    environment:
      - LLM_BASE_URL=http://llm:11434
      - LLM_TIMEOUT=120
      - LLM_BACKEND=${LLM_BACKEND:-ollama}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - DATABASE_PATH=/data/corrections.db
      - DICTIONARIES_PATH=/data/dictionaries
      - PLUGINS_PATH=/plugins
      - CONFIG_PATH=/config/settings.yaml
    depends_on:
      llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/internal/health"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  api-gateway:
    build: ./services/api-gateway
    container_name: autocorrect-api
    networks:
      - app_net
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./config:/config:ro
    environment:
      - CORRECTION_ENGINE_URL=http://correction-engine:8081
      - API_KEY=${API_KEY:-changeme}
      - CONFIG_PATH=/config/settings.yaml
    depends_on:
      correction-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  internal_net:
    internal: true
  app_net:
    driver: bridge
  external_net:
    driver: bridge

volumes:
  models_data:
  app_data:
  plugins_data:
